name: Issue to Jekyll and Zenn

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Convert Issue to Jekyll Post and Zenn Article
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels) }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # --- 1. Jekyllブログ用のファイルを作成 ---
          # (Jekyll側は変更ありません)
          mkdir -p _posts
          JEKYLL_DATE=$(date -u +"%Y-%m-%d")
          JEKYLL_DATETIME=$(date -u +"%Y-%m-%d %H:%M:%S %z")
          JEKYLL_FILENAME="_posts/${JEKYLL_DATE}-issue-${ISSUE_NUMBER}.md"
          
          {
            echo "---"
            echo "title: \"$ISSUE_TITLE\""
            echo "date: $JEKYLL_DATETIME"
            echo "categories: issue"
            echo "---"
            echo ""
            echo "$ISSUE_BODY"
          } > $JEKYLL_FILENAME
          
          echo "Generated Jekyll post: $JEKYLL_FILENAME"

          # --- 2. Zenn用のファイルを作成 ---
          mkdir -p articles
          ZENN_DATE=$(date -u +"%Y%m%d")
          ZENN_FILENAME="articles/${ZENN_DATE}-issue-${ISSUE_NUMBER}.md"
          
          # Zennフロントマターの処理
          EMOJI="😊"
          TYPE="tech"
          
          # 'publish' ラベルがもし付いていてもトピックにならないように除外します
          TOPICS=$(echo "$ISSUE_LABELS" | jq -c '[.[] | .name | select(. != "publish")]')

          {
            echo "---"
            echo "title: \"$ISSUE_TITLE\""
            echo "emoji: \"$EMOJI\""
            echo "type: \"$TYPE\""
            echo "topics: $TOPICS"
            # ★★★★★ ここを変更しました！ ★★★★★
            # 'publish' ラベルのチェックをなくし、常に 'true' (公開) にします
            echo "published: true"
            # ★★★★★ 変更ここまで ★★★★★
            echo "---"
            echo ""
            echo "$ISSUE_BODY"
          } > $ZENN_FILENAME
          
          echo "Generated Zenn article: $ZENN_FILENAME"

      - name: Commit and push changes
        run: |
          git checkout master
          git add _posts/
          git add articles/
          
          if ! git diff --cached --quiet; then
            git commit -m "Add/Update post and article from issue #${{ github.event.issue.number }}"
            git push
            echo "Committed and pushed changes to Jekyll (_posts) and Zenn (articles)."
          else
            echo "No changes to commit."
          fi
